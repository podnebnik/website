# countries/si.yaml — Slovenia Climate Explorer
# Single source of truth for the Slovenia deploy.
# Copy this file to countries/<cc>.yaml to add another country.

code: si
name: Slovenia
timezone: Europe/Ljubljana
default_location: Ljubljana
languages: [en, sl]
default_language: sl

data_start_date: "1950-01-01"
baseline:          { start: 1950, end: 1980 }
trend_start_year:  1950
projection_end_year: 2050

map:
  center_lat: 46.1
  center_lon:  14.8
  zoom:         7      # tune after first render (browser console: mapChart.mapView.zoom)

branding:
  site_title:     "Slovenia Climate Explorer"
  domain:         "podnebje.kesma.wtf"
  chatbot_name:   ""
  chatbot_avatar: ""

features:
  regression_chart:    true
  trend_calendar:      true
  station_map:         true
  hero_cards:          true
  today_section:       true
  season_heat_heatmap: true
  spei_heatmap:        true
  sea_level_section:   true
  drought_trend_chart: true
  chatbot:             false   # no Azure Direct Line for Slovenia
  welcome_modal:       true
  next_episodes_teaser: false
  mk2036_section:      false
  analytics_export:    false
  tropical_days_chart:   true
  tropical_nights_chart: true

stations:
  - { name: Ljubljana,          lat: 46.0511, lon: 14.5051, elevation: 299,  elevation_era5_m: 300  }
  - { name: Maribor,            lat: 46.5547, lon: 15.6459, elevation: 270,  elevation_era5_m: 262  }
