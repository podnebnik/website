  - { name: Kranj,              lat: 46.2392, lon: 14.3556, elevation: 387,  elevation_era5_m: 389  }
  - { name: Koper,              lat: 45.5483, lon: 13.7300, elevation: 10,   elevation_era5_m: 18   }
  - { name: Novo_Mesto,         lat: 45.8011, lon: 15.1700, elevation: 220,  elevation_era5_m: 164  }
  - { name: Murska_Sobota,      lat: 46.6625, lon: 16.1667, elevation: 189,  elevation_era5_m: 192  }
  - { name: Nova_Gorica,        lat: 45.9564, lon: 13.6431, elevation: 94,   elevation_era5_m: 93   }
  - { name: Postojna,           lat: 45.7756, lon: 14.2133, elevation: 549,  elevation_era5_m: 557  }
