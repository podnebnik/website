# Attaches to the shared Gateway `main` in kube-system (infrastructure repo
# owns it): wildcard TLS terminates there, external-dns publishes the
# hostname to Cloudflare.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: website
spec:
  parentRefs:
    - name: main
      namespace: kube-system
  hostnames:
    - {{ .Values.host | quote }}
  rules:
    - backendRefs:
        - name: website
          port: 80
