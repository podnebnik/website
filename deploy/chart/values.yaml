# Base values. Helm always loads this file; ArgoCD layers values-stage.yaml
# or values-prod.yaml on top (the preview ApplicationSet overrides inline).

# Public hostname: becomes the HTTPRoute hostname on the shared Gateway
# `main` (kube-system) — external-dns creates the DNS record from it and the
# Gateway's wildcard cert covers TLS. No Ingress/cert/DNS config here.
host: podnebnik.org

image:
  repository: ghcr.io/podnebnik/website
  # stage: bumped automatically by argocd-image-updater (values-stage.yaml);
  # prod: pinned in values-prod.yaml — edit there to promote
  tag: latest

replicas: 1

resources:
  requests:
    cpu: 10m
    memory: 32Mi
  limits:
    memory: 128Mi

# Name of a Secret delivered by the infrastructure repo
# (argocd/manifests/podnebnik/secrets-<env>) to expose as env vars.
# Empty = none (the site is static nginx and needs no secrets today).
existingSecret: ""

# Preview environments only (set by the website-preview ApplicationSet in the
# infrastructure repo): CNPG database cloned from postgres-prod via the
# preview_import role. Requires the preview-import Secret in the namespace.
previewDatabase:
  enabled: false
  database: podnebnik
