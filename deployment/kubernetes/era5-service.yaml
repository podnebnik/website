apiVersion: v1
kind: Service
metadata:
  name: podnebnik-era5
  namespace: podnebnik  # adapt to your namespace
spec:
  selector:
    app: podnebnik-era5
  ports:
    - name: http
      port: 80
      targetPort: 80

# Point your Ingress (or VirtualService) at podnebnik-era5:80.
# The existing podnebnik.org Ingress continues pointing at the
# original website service unchanged.
