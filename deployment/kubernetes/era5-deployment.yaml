apiVersion: apps/v1
kind: Deployment
metadata:
  name: podnebnik-era5
  namespace: podnebnik  # adapt to your namespace
spec:
  replicas: 1  # RWO PVC — only one replica
  selector:
    matchLabels:
      app: podnebnik-era5
  strategy:
    type: Recreate  # RWO — must release volume before new pod mounts
  template:
    metadata:
      labels:
        app: podnebnik-era5
    spec:

      initContainers:
        - name: era5-collect-init
          image: ghcr.io/podnebnik/era5-sidecar:latest
          command: ["sh", "-c"]
          args:
            - |
              # skip if data already exists from a previous deploy
              if [ ! -f /app/data/si/.collected ]; then
                uv run python mk_collect.py &&
                uv run python mk_precompute.py &&
                touch /app/data/si/.collected
              fi
          env:
            - name: COUNTRY
              value: "si"
            - name: DATA_DIR
              value: "/app/data/si"
          volumeMounts:
            - name: era5-data
              mountPath: /app/data/si
          resources:
            requests:
              memory: "512Mi"
              cpu: "500m"
            limits:
              memory: "1Gi"
              cpu: "1000m"

      containers:

        # nginx: serves the ERA5 website, proxies /api/live/* to the sidecar
        - name: website-era5
          image: ghcr.io/podnebnik/website-era5:latest
          ports:
            - containerPort: 80
          env:
            - name: ERA5_SIDECAR_HOST
              value: "localhost"  # same pod — loopback
          readinessProbe:
            httpGet:
              path: /ali-je-vroce-era5/
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"

        # Flask sidecar: ERA5 API on port 5052
        - name: era5-sidecar
          image: ghcr.io/podnebnik/era5-sidecar:latest
          ports:
            - containerPort: 5052
          env:
            - name: COUNTRY
              value: "si"
            - name: DATA_DIR
              value: "/app/data/si"
            - name: SIDECAR_PORT
              value: "5052"
          volumeMounts:
            - name: era5-data
              mountPath: /app/data/si
          readinessProbe:
            httpGet:
              path: /api/live/meta
              port: 5052
            initialDelaySeconds: 15  # initContainer already collected data
            periodSeconds: 20
            failureThreshold: 15
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "2Gi"
              cpu: "1000m"

      volumes:
        - name: era5-data
          persistentVolumeClaim:
            claimName: era5-data
