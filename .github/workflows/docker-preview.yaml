name: "Docker: preview images"

# Preview environments (sledilnik/infrastructure, podnebnik-website-preview
# ApplicationSet) deploy PRs labeled `preview-deploy` and expect
# ghcr.io/podnebnik/<image>:pr-<number> to exist. This workflow builds and
# pushes BOTH images for every labeled PR — deliberately no `paths` filter,
# so the preview never misses an image the PR didn't touch.
# Fork PRs are excluded: they run without a packages:write token.

on:
  pull_request:
    branches:
      - "main"
    types: [opened, synchronize, reopened, labeled]

permissions:
  contents: read
  packages: write

jobs:
  docker:
    if: >-
      contains(github.event.pull_request.labels.*.name, 'preview-deploy') &&
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - image: website
            dockerfile: ./deployment/Dockerfile.website
          - image: era5-api
            dockerfile: ./deployment/Dockerfile.era5-api
    steps:
      -
        name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      -
        name: Docker meta
        id: meta
        uses: docker/metadata-action@80c7e94dd9b9319bd5eb7a0e0fe9291e23a2a2e9 # v6.1.0
        with:
          images: |
            ghcr.io/${{ github.repository_owner }}/${{ matrix.image }}
          tags: |
            type=ref,event=pr

      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0

      -
        name: Login to GitHub Container Registry
        uses: docker/login-action@650006c6eb7dba73a995cc03b0b2d7f5ca915bee # v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      -
        name: Build and push
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # previews run on a single amd64 node — skip the slow arm64 QEMU build
          platforms: linux/amd64
