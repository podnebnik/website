name: Build website

on:
  push:
    branches:
      - main
    paths-ignore:
      # ArgoCD image-updater commits the new tag back into deploy/ after each
      # build. Ignore it so that write-back doesn't retrigger build -> push ->
      # write-back forever.
      - 'deploy/**'

  pull_request:
    paths-ignore:
      - 'deploy/**'

  workflow_dispatch:

permissions:
  contents: read # to allow the action to read the repository contents

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

      - name: Install dotnet
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'yarn'

      - name: Install libvips
        run: sudo apt-get update && sudo apt-get install -y libvips-dev

      - run: yarn install
      - run: yarn build

  # T-1.1 — the output snapshot is only a regression net if something reads it.
  # `yarn snapshot:check` renders the ERA5 page offline against the committed
  # fixtures with the date pinned, and exits non-zero on any difference from
  # tests/fixtures/snapshot.json, printing the differing paths. A PR that moves a
  # published number must update the baseline in the same commit, with the reason
  # (CLAUDE.md ground rule 2).
  #
  # Separate job from `build`: it needs neither dotnet nor libvips, and its
  # failure means something different — a number moved, not a broken build.
  snapshot:
    runs-on: ubuntu-latest
    steps:
      # Only because the root `postinstall` is `dotnet tool restore` — the
      # harness itself is Node-only.
      - name: Install dotnet
        uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Checkout repo
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - run: corepack enable

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: 'yarn'

      - run: yarn install

      # The harness runs fully offline against tests/fixtures — no network, no
      # datasette, no Open-Meteo. TZ and locale are pinned by run.mjs and
      # re-asserted inside, so a runner with different settings fails loudly
      # instead of reporting a spurious diff.
      - run: yarn snapshot:check
